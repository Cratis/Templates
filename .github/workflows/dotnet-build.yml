name: .NET Build

env:
  DOTNET8_VERSION: "8.0.407"
  DOTNET9_VERSION: "9.0.x"
  DOTNET10_VERSION: "10.0.x"

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
  push:
    branches:
      - "main"
    paths:
      - "Cratis.Templates.csproj"
      - "Templates/**"
      - ".github/workflows/dotnet-build.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "Cratis.Templates.csproj"
      - "Templates/**"
      - ".github/workflows/dotnet-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET8_VERSION }}
            ${{ env.DOTNET9_VERSION }}
            ${{ env.DOTNET10_VERSION }}

      - name: Generate NuGet.config
        shell: bash
        run: |
          cat > NuGet.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          EOF

      - name: Restore
        run: dotnet restore Cratis.Templates.csproj --configfile ./NuGet.config

      - name: Build
        run: dotnet build Cratis.Templates.csproj --configuration Release --no-restore

      - name: Validate package
        run: dotnet pack Cratis.Templates.csproj --no-build --no-restore --configuration Release -o ./Artifacts/NuGet -p:PackageVersion=0.0.0-ci

      - name: Validate templates generate buildable projects
        timeout-minutes: 15
        shell: bash
        run: |
          ./install-local.sh

          validation_root="$(mktemp -d)"
          echo "Using validation root: $validation_root"

          # Copy NuGet.config to the validation root so that dotnet restore
          # (which runs inside subdirectories of validation_root) can walk up
          # and find it, ensuring only nuget.org is used as a package source.
          cp NuGet.config "$validation_root/NuGet.config"

          run_dotnet_new() {
            "$@"
          }

          build_generated_project() {
            local project_root="$1"
            local solution_file
            local project_file

            solution_file="$(find "$project_root" -maxdepth 1 -name '*.sln' | head -n 1)"
            if [[ -n "$solution_file" ]]; then
              dotnet restore "$solution_file" --configfile "$validation_root/NuGet.config"
              dotnet build "$solution_file" --configuration Release --no-restore
              return
            fi

            project_file="$(find "$project_root" -maxdepth 1 -name '*.csproj' | head -n 1)"
            if [[ -z "$project_file" ]]; then
              echo "No .sln or .csproj found in $project_root"
              return 1
            fi

            dotnet restore "$project_file" --configfile "$validation_root/NuGet.config"
            dotnet build "$project_file" --configuration Release --no-restore
          }

          run_dotnet_new dotnet new cratis-chronicle-console -n ValidateChronicleConsole -o "$validation_root/ValidateChronicleConsole" --Framework net10.0
          build_generated_project "$validation_root/ValidateChronicleConsole"

          run_dotnet_new dotnet new cratis-chronicle-web -n ValidateChronicleWeb -o "$validation_root/ValidateChronicleWeb" --Framework net10.0
          build_generated_project "$validation_root/ValidateChronicleWeb"

          run_dotnet_new dotnet new cratis -n ValidateCratis -o "$validation_root/ValidateCratis" --Framework net10.0 --allow-scripts Yes
          build_generated_project "$validation_root/ValidateCratis"
